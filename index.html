<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YupiStore Food Manager</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:15px;
}

.header{
    text-align:center;
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

.card{
    background:white;
    border-radius:15px;
    padding:12px;
    margin-bottom:12px;
    display:flex;
    gap:12px;
    align-items:center;
}

.card img{
    width:60px;
    height:60px;
    object-fit:contain;
}

.info{
    flex:1;
}

.name{
    font-size:18px;
    font-weight:bold;
    color:#4d684d;
}

.stock{
    width:70px;
    padding:5px;
    border-radius:8px;
    border:1px solid #ccc;
}

.controls{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
}

button{
    width:45px;
    height:45px;
    border-radius:12px;
    border:none;
    border-radius:12px;
    padding:10px 15px;
    background:#dbe8d3;
    font-weight:bold;
    cursor:pointer;
    margin:4px;
    }

.stats{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
}

#listPilihan{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-top:15px;
}
.machine{
    display:inline-block;
    background:#f4e8d1;
    color:#d67a00;
    padding:4px 10px;
    border-radius:8px;
    font-size:14px;
    font-weight:bold;
    margin-top:4px;
}
</style>
</head>

<body>

<div class="header">
<h1>🍂 YupiStore Food Manager 🍂</h1>
</div>

<div class="stats">
<b>Total Food:</b> 2<br>
<b>Level Tertinggi:</b> 120<br>
<b>Total Dipilih:</b> <span id="totalDipilih">0</span>
</div>

<div style="text-align:center; margin-bottom:15px;">
<button>📋 Food List</button>
<button>📋 Salin List</button>
<button>🔄 Reset</button>
</div>

<h2 style="background:#dbe8d3;padding:10px 15px;border-radius:12px;">
🏭 Bakery
</h2>

<div class="card">
<img src="images/Bread.webp">

<div class="info">
<div class="name">Bread</div>
<div class="machine">Bakery</div>
Level 2<br>
Stock:
<input class="stock" id="stock_bread" value="200">

<div class="controls">
<button onclick="ubah('bread',-10)">-10</button>
<span id="bread">0</span>
<button onclick="ubah('bread',10)">+10</button>
</div>

</div>
</div>

<div class="card">
<img src="images/Corn_Bread.webp">

<div class="info">
<div class="name">Corn Bread</div>
Level 7<br>
Stock:
<input class="stock" id="stock_corn" value="200">

<div class="controls">
<button onclick="ubah('corn',-10)">-10</button>
<span id="corn">0</span>
<button onclick="ubah('corn',10)">+10</button>
</div>

</div>
 </div>   
    
<div class="card">
<img src="images/Cookie.webp">

<div class="info">
<div class="name">Cookie</div>
Level 10<br>
Stock:
<input class="stock" id="stock_cookie" value="200">

<div class="controls">
<button onclick="ubah('cookie',-10)">-10</button>
<span id="cookie">0</span>
<button onclick="ubah('cookie',10)">+10</button>
</div>

</div>
</div>

<div id="listPilihan">
<h3>📝 List Pilihan</h3>
<div id="list"></div>
</div>

<script>

let data = {
bread:0,
corn:0,
cookie:0
};

function ubah(item,nilai){

data[item]+=nilai;

if(data[item]<0){
data[item]=0;
}

document.getElementById(item).innerText=data[item];

update();
}

function update(){

let total=0;
let hasil=[];

for(let item in data){

total+=data[item];

if(data[item]>0){

let namaMap = {
bread:"Bread",
corn:"Corn Bread",
cookie:"Cookie"
};

let nama = namaMap[item];

hasil.push(nama+" x"+data[item]);
}
}

document.getElementById("totalDipilih").innerText=total;
document.getElementById("list").innerHTML=hasil.join("<br>");
}

</script>

</body>
</html>
