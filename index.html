<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YupiStore Food Manager</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:15px;
}

.header{
    text-align:center;
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

.card{
    background:white;
    border-radius:15px;
    padding:12px;
    margin-bottom:12px;
    display:flex;
    gap:12px;
    align-items:center;
}

.card img{
    width:70px;
    height:70px;
    object-fit:contain;
}

.info{
    flex:1;
}

.name{
    font-size:18px;
    font-weight:bold;
}

.stock{
    width:70px;
}

.controls{
    margin-top:8px;
}

button{
    width:32px;
    height:32px;
}

.stats{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
}

#listPilihan{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="header">
<h1>🍂 YupiStore Food Manager 🍂</h1>
</div>

<div class="stats">
<b>Total Food:</b> 2<br>
<b>Level Tertinggi:</b> 104<br>
<b>Total Dipilih:</b> <span id="totalDipilih">0</span>

<br><br>

<button>📋 Salin List</button>
<button>🔄 Reset</button>

</div>

<h2>🏭 Bakery</h2>

<div class="card">
<img src="images/Bread.webp">

<div class="info">
<div class="name">Bread</div>
Level 2<br>
Stock:
<input class="stock" id="stock_bread" value="200">

<div class="controls">
<button onclick="ubah('bread',-1)">-</button>
<span id="bread">0</span>
<button onclick="ubah('bread',1)">+</button>
</div>

</div>
</div>

<div class="card">
<img src="images/Corn_Bread.webp">

<div class="info">
<div class="name">Corn Bread</div>
Level 7<br>
Stock:
<input class="stock" id="stock_corn" value="200">

<div class="controls">
<button onclick="ubah('corn',-1)">-</button>
<span id="corn">0</span>
<button onclick="ubah('corn',1)">+</button>
</div>

</div>
</div>

<div id="listPilihan">
<h3>📝 List Pilihan</h3>
<div id="list"></div>
</div>

<script>

let data = {
bread:0,
corn:0
};

function ubah(item,nilai){

data[item]+=nilai;

if(data[item]<0){
data[item]=0;
}

document.getElementById(item).innerText=data[item];

update();
}

function update(){

let total=0;
let hasil=[];

for(let item in data){

total+=data[item];

if(data[item]>0){

let nama=item==="bread"
? "Bread"
: "Corn Bread";

hasil.push(nama+" x"+data[item]);
}
}

document.getElementById("totalDipilih").innerText=total;
document.getElementById("list").innerHTML=hasil.join("<br>");
}

</script>

</body>
</html>
